# Capabilities this project promises — managed with `caps`.
# Prove with: python -m caps verify
capabilities:
  - id: hole-completion-distinct-18
    description: a quarters-only game completes only when all 18 distinct holes are
      scored; duplicate/partial submissions don't complete early or inflate standings
    given: hole-score submissions that may contain a duplicate hole or fewer than 18
      distinct holes
    when: scores are saved via POST /games/{id}/scores
    then: completion fires only on the full 1-18 distinct set and duplicate holes dedupe
      (last write wins)
    tier: cheap
    deps:
    - backend/app/routers/games_holes.py
    check:
      shell: cd backend && venv/bin/python -m pytest tests/unit/routers/test_games_holes_router.py
        -q -p no:cacheprovider
  - id: request-validation-422-envelope
    description: malformed requests are rejected with the normalized 422 envelope {error,
      detail, fields[]}, not a raw array or a 500
    given: a request that fails Pydantic validation
    when: it reaches the FastAPI app
    then: the response is HTTP 422 with a string `detail` and a `fields` list
    tier: cheap
    deps:
    - backend/app/main.py
    check:
      shell: cd backend && venv/bin/python -m pytest tests/unit/test_validation_error_envelope.py
        -q -p no:cacheprovider
  - id: request-shape-validation-on-models
    description: request-shape validation (non-blank strings, numeric ranges, required
      fields) lives on Pydantic models via the shared validators, not hand-rolled in
      handlers
    given: request bodies with blank/oversized/out-of-range fields
    when: they are validated against the request models
    then: the shared non_blank/NonBlankStr validators reject them at the model layer
    tier: cheap
    deps:
    - backend/app/routers/_validators.py
    check:
      shell: cd backend && venv/bin/python -m pytest tests/unit/routers/test_validators.py
        -q -p no:cacheprovider
  - id: health-live-production
    description: the deployed backend is up and reports the production environment with
      a healthy database
    given: the Render deployment of the backend
    when: GET /health is requested
    then: it returns 200 and reports environment=production
    tier: live
    deps: []
    check:
      shell: resp=$(curl -s -w '|%{http_code}' --max-time 15 https://wolf-goat-pig.onrender.com/health)
        || exit 3; code=${resp##*|}; body=${resp%|*}; [ "$code" = 200 ] || exit 1; printf
        '%s' "$body" | grep -qF 'production' || exit 1; exit 0
  - id: auth-rejects-junk-token
    description: a protected endpoint rejects a bogus bearer token with 401 (not a 500),
      proving the auth chain is wired
    given: the deployed backend and an invalid bearer token
    when: GET /players/me is requested with that token
    then: the response is HTTP 401
    tier: live
    deps: []
    check:
      shell: 'code=$(curl -s -o /dev/null -w ''%{http_code}'' --max-time 15 -H ''Authorization:
        Bearer junk.token.here'' https://wolf-goat-pig.onrender.com/players/me) || exit
        3; [ "$code" = 401 ] && exit 0 || exit 1'
