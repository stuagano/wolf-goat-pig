services:
  # PostgreSQL database (must be first for connection string to be available)
  - type: pserv
    name: wolf-goat-pig-db
    env: postgresql
    plan: free
    region: oregon
    databaseName: wolf_goat_pig
    user: wolf_goat_pig_user
    ipAllowList: []

  # Backend API service
  - type: web
    name: wolf-goat-pig-api
    env: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python render-startup.py
    envVars:
      - key: DATABASE_URL
        fromService:
          name: wolf-goat-pig-db
          type: pserv
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://wolf-goat-pig.vercel.app
      - key: BACKEND_URL
        value: https://wolf-goat-pig.onrender.com
      - key: ENABLE_GHIN_INTEGRATION
        value: "false"
      - key: GHIN_API_USER
        value: ""
      - key: GHIN_API_PASS
        value: ""
      - key: GHIN_API_STATIC_TOKEN
        value: ""
      - key: AUTH0_DOMAIN
        value: "dev-jm88n088hpt7oe48.us.auth0.com"
      - key: AUTH0_API_AUDIENCE
        value: "https://wolf-goat-pig.onrender.com"
      - key: AUTH0_CLIENT_ID
        value: "qAZuRv5E9mPQ9uTGg7NWpkpfVj8bCeoB"
      - key: LEGACY_SIGNUP_SYNC_ENABLED
        value: "true"
      - key: LEGACY_SIGNUP_CREATE_URL
        value: "https://thousand-cranes.com/WolfGoatPig/wgp_add_tee_sheet_ajax.cgi"
      - key: LEGACY_SIGNUP_FIELD_MAP
        value: '{"player_name": "name", "date": "date"}'
      - key: LEGACY_SIGNUP_CREATE_ACTION_FIELD
        value: "type"
      - key: LEGACY_SIGNUP_CREATE_ACTION_VALUE
        value: "add"
      - key: LEGACY_SIGNUP_CANCEL_ACTION_FIELD
        value: "type"
      - key: LEGACY_SIGNUP_CANCEL_ACTION_VALUE
        value: "cancel"
      - key: FORETEES_ENABLED
        value: "false"
      - key: FORETEES_USERNAME
        value: ""
      - key: FORETEES_PASSWORD
        value: ""
      - key: FORETEES_ENCRYPTION_KEY
        value: ""
      - key: WEB_CONCURRENCY
        value: "1"
      - key: FORWARDED_ALLOW_IPS
        value: "*"
      - key: TIMEOUT_KEEP_ALIVE
        value: "75"
    healthCheckPath: /ready
    autoDeploy: true
    disk:
      name: wolf-goat-pig-api-disk
      mountPath: /opt/render/project/src/data
      sizeGB: 1

