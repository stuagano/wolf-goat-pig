services:
  # Backend API service
  - type: web
    name: wolf-goat-pig-api
    env: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python render-startup.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        value: https://wolf-goat-pig.vercel.app
      - key: BACKEND_URL
        value: https://wolf-goat-pig.onrender.com
      - key: ENABLE_GHIN_INTEGRATION
        value: "true"
      - key: GHIN_API_USER
        sync: false
      - key: GHIN_API_PASS
        sync: false
      - key: GHIN_API_STATIC_TOKEN
        value: "ghincom"
      - key: AUTH0_DOMAIN
        value: "dev-jm88n088hpt7oe48.us.auth0.com"
      - key: AUTH0_API_AUDIENCE
        value: "https://wolf-goat-pig.onrender.com"
      - key: AUTH0_CLIENT_ID
        value: "qAZuRv5E9mPQ9uTGg7NWpkpfVj8bCeoB"
      - key: LEGACY_SIGNUP_SYNC_ENABLED
        value: "true"
      - key: LEGACY_SIGNUP_CREATE_URL
        value: "https://thousand-cranes.com/WolfGoatPig/wgp_add_tee_sheet_ajax.cgi"
      - key: LEGACY_SIGNUP_FIELD_MAP
        value: '{"player_name": "name", "date": "date"}'
      - key: LEGACY_SIGNUP_CREATE_ACTION_FIELD
        value: "type"
      - key: LEGACY_SIGNUP_CREATE_ACTION_VALUE
        value: "add"
      - key: LEGACY_SIGNUP_CANCEL_ACTION_FIELD
        value: "type"
      - key: LEGACY_SIGNUP_CANCEL_ACTION_VALUE
        value: "cancel"
      - key: EMAIL_PROVIDER
        value: resend
      - key: FROM_EMAIL
        value: onboarding@resend.dev
      - key: FROM_NAME
        value: Wolf Goat Pig
      - key: RESEND_API_KEY
        sync: false
      - key: BOOKING_SERVICE_URL
        value: "https://wolf-goat-pig-booking.onrender.com"
      - key: BOOKING_SERVICE_SECRET
        sync: false
      - key: FORETEES_ENABLED
        value: "true"
      # Dashboard-managed secrets — NOT committed. Previously `value: ""`, which
      # a Blueprint sync would write over the live values; FORETEES_ENCRYPTION_KEY
      # is the Fernet key for per-user ForeTees creds, so blanking it breaks them.
      - key: FORETEES_USERNAME
        sync: false
      - key: FORETEES_PASSWORD
        sync: false
      - key: FORETEES_ENCRYPTION_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: "1"
      - key: FORWARDED_ALLOW_IPS
        value: "*"
      - key: TIMEOUT_KEEP_ALIVE
        value: "75"
      # --- Observability (Phase 2) ---
      # SENTRY_DSN is a Sentry ingestion key (public by design — the frontend
      # DSN even ships in the browser bundle); committed for version control.
      # If the public DSN ever gets abused to spam the free-tier quota, rotate
      # it in Sentry → Settings → Client Keys (DSN) and update this value.
      - key: SENTRY_DSN
        value: "https://a2c007dfb1792d9f41e2d6c8c838dfcd@o4511570300502016.ingest.us.sentry.io/4511570311839744"
      # Guard for GET /health/external. Set a URL-safe value in the Render
      # dashboard (e.g. `openssl rand -hex 32` — no /, +, = so it works as a
      # ?monitor_key= query param) and put the same value in the uptime monitor.
      # sync:false so it's never committed to this public repo.
      - key: MONITOR_KEY
        sync: false
      - key: EXTERNAL_HEALTH_TTL
        value: "300"
    healthCheckPath: /ready
    autoDeploy: true

  # ForeTees booking microservice (Node.js + Playwright headless browser)
  - type: web
    name: wolf-goat-pig-booking
    env: node
    plan: free
    region: oregon
    rootDir: booking-service
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: BOOKING_SERVICE_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "22"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: "/opt/render/project/src/booking-service/.playwright-browsers"
    healthCheckPath: /health
    autoDeploy: true
