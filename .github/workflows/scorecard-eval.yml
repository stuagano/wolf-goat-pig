name: Scorecard Accuracy Eval

# Manual only. Runs the held-out 5-man card through the real Groq Vision
# pipeline N times and reports a variance band for guided-single vs adaptive.
# Needs the GROQ_API_KEY repo secret.
on:
  workflow_dispatch:
    inputs:
      runs:
        description: "Runs per config (guided-single and adaptive)"
        default: "5"
      vision_model:
        description: "Groq vision model ID"
        default: "meta-llama/llama-4-scout-17b-16e-instruct"
      main_max_dim:
        description: "Max longest-side px for the main image (lower to fit a smaller TPM quota)"
        default: "4096"
      skip_reference_examples:
        description: "Skip few-shot reference images (1 to skip, reduces token usage)"
        default: "0"

jobs:
  eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-testing.txt
      - name: Run scorecard accuracy eval
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_VISION_MODEL: ${{ github.event.inputs.vision_model }}
          GROQ_MAIN_MAX_DIM: ${{ github.event.inputs.main_max_dim }}
          GROQ_SKIP_REFERENCE_EXAMPLES: ${{ github.event.inputs.skip_reference_examples }}
        run: |
          python scripts/scorecard_eval.py "${{ github.event.inputs.runs }}"
