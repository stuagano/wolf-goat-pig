name: Daily GHIN Handicap Sync

on:
  schedule:
    - cron: '0 14 * * *'  # 10am ET daily
  workflow_dispatch:       # Allow manual trigger

# Don't let a slow run overlap the next scheduled fire; never cancel one that's
# already talking to the backend.
concurrency:
  group: ghin-sync
  cancel-in-progress: false

jobs:
  sync:
    uses: ./.github/workflows/_cron-curl.yml
    with:
      label: GHIN sync
      url: https://wolf-goat-pig.onrender.com/ghin/sync-handicaps
      headers: 'Content-Type: application/json'
      max-time: 60
