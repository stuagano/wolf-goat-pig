name: Frontend CI

# NOTE: frontend/package-lock.json is intentionally NOT committed (it breaks
# Vercel builds — see vercel.json installCommand). Therefore this workflow
# uses `npm install`, never `npm ci`, and does not cache against a lockfile.

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'vercel.json'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'vercel.json'
      - '.github/workflows/frontend-ci.yml'

# Cancel superseded runs: a new push to the same PR/branch aborts the in-flight
# run instead of piling up redundant CI.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies
      working-directory: frontend
      # Mirrors vercel.json installCommand
      run: npm install --legacy-peer-deps --no-audit

    # No lint step: eslint is not currently a project dependency.
    # If you add eslint + config, restore: npm run lint

    - name: Type check
      working-directory: frontend
      run: npm run typecheck

    - name: Run tests
      working-directory: frontend
      run: npm run test:ci
      env:
        CI: true

    - name: Build application
      working-directory: frontend
      run: npm run build
      env:
        CI: false
        REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL || 'http://localhost:8000' }}
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: frontend-build
        path: frontend/build/

  analyze:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    # Reuse the build produced by the `test` job instead of rebuilding from
    # scratch. There is no committed lockfile, so `npm ci` cannot run here —
    # install deps the same way `test` does so webpack-bundle-analyzer is
    # available for the analysis below.
    - name: Download build artifact
      uses: actions/download-artifact@v5
      with:
        name: frontend-build
        path: frontend/build

    - name: Install dependencies
      working-directory: frontend
      run: npm install --legacy-peer-deps --no-audit

    - name: Run bundle size analysis
      working-directory: frontend
      run: npx webpack-bundle-analyzer build/static/js/*.js --mode json --report bundle-stats.json
      continue-on-error: true

    - name: Upload bundle analysis
      uses: actions/upload-artifact@v7
      with:
        name: bundle-analysis
        path: frontend/bundle-stats.json
      if: always()

  lighthouse:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    # Reuse the `test` job's build (Lighthouse runs against ./build via
    # .lighthouserc.js staticDistDir) rather than rebuilding a third time.
    - name: Download build artifact
      uses: actions/download-artifact@v5
      with:
        name: frontend-build
        path: frontend/build

    - name: Install dependencies
      working-directory: frontend
      run: npm install --legacy-peer-deps --no-audit

    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v12
      with:
        configPath: './frontend/.lighthouserc.js'
        uploadArtifacts: true
        temporaryPublicStorage: true
      continue-on-error: true

  # Production deployment handled by:
  # - Vercel: Auto-deploys via GitHub integration (free tier)
  # - Render: Triggered via deploy hook in .github/workflows/deploy.yml
  # See deploy.yml for unified deployment workflow
