name: Frontend CI

# NOTE: frontend/package-lock.json is intentionally NOT committed (it breaks
# Vercel builds — see vercel.json installCommand). Therefore this workflow
# uses `npm install`, never `npm ci`, and does not cache against a lockfile.

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'vercel.json'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - 'vercel.json'
      - '.github/workflows/frontend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies
      working-directory: frontend
      # Mirrors vercel.json installCommand
      run: npm install --legacy-peer-deps --no-audit

    # No lint step: eslint is not currently a project dependency.
    # If you add eslint + config, restore: npm run lint

    - name: Type check
      working-directory: frontend
      run: npm run typecheck

    - name: Run tests
      working-directory: frontend
      run: npm run test:ci
      env:
        CI: true

    - name: Build application
      working-directory: frontend
      run: npm run build
      env:
        CI: false
