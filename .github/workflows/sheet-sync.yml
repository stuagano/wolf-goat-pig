name: Sheet → DB Sync

on:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours (mirrors the in-process job that no-ops in prod)
  workflow_dispatch:        # Allow manual trigger

# Don't let a slow run overlap the next scheduled fire; never cancel one that's
# already talking to the backend.
concurrency:
  group: sheet-sync
  cancel-in-progress: false

jobs:
  sync:
    uses: ./.github/workflows/_cron-curl.yml
    with:
      label: Sheet → DB sync
      url: https://wolf-goat-pig.onrender.com/admin/spreadsheet/sync-legacy-rounds
      headers: 'X-Admin-Email: stuagano@gmail.com'
      max-time: 120
