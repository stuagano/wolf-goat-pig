name: LivSow Roster Snapshot

# Records roster snapshots and auto-derives transactions (trades, signings,
# releases) by diffing against the previous confirmed snapshot. Two runs/day
# so the 30-minute debounce confirms within ~12h even with zero site traffic.

on:
  schedule:
    - cron: '0 15 * * *'   # 8am PT
    - cron: '0 23 * * *'   # 4pm PT
  workflow_dispatch:

# Don't let a slow run overlap the next scheduled fire; never cancel one that's
# already talking to the backend.
concurrency:
  group: livsow-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    uses: ./.github/workflows/_cron-curl.yml
    with:
      label: LivSow snapshot
      url: https://wolf-goat-pig.onrender.com/data/livsow/snapshot
      headers: 'Content-Type: application/json'
      max-time: 90

  media-harvest:
    needs: snapshot
    uses: ./.github/workflows/_cron-curl.yml
    with:
      label: Media harvest
      url: https://wolf-goat-pig.onrender.com/groupme/media/harvest
      max-time: 120
