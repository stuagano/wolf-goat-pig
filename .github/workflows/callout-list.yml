name: Headcount Callout List

# Emails the opt-in callout list when the upcoming Sunday game is short of a
# full foursome. Driven here (not the in-process scheduler, which is a no-op
# shim in prod) — same pattern as the GHIN sync cron.
on:
  schedule:
    - cron: '0 22 * * 5'  # Friday 22:00 UTC (~2-3pm PT) — pre-pairing recruiting call
    - cron: '0 15 * * 0'  # Sunday 15:00 UTC (~8am PT) — morning-of last call
  workflow_dispatch:
    inputs:
      window:
        description: 'Callout window'
        required: true
        default: 'pre_pairing'
        type: choice
        options:
          - pre_pairing
          - morning_of

# Don't let a slow run overlap the next scheduled fire; never cancel one that's
# already talking to the backend.
concurrency:
  group: callout-list
  cancel-in-progress: false

jobs:
  determine-window:
    runs-on: ubuntu-latest
    outputs:
      window: ${{ steps.window.outputs.window }}
    steps:
    - name: Determine window
      id: window
      run: |
        if [ -n "${{ github.event.inputs.window }}" ]; then
          WINDOW="${{ github.event.inputs.window }}"
        elif [ "$(date -u +%u)" = "5" ]; then
          WINDOW="pre_pairing"   # Friday
        else
          WINDOW="morning_of"    # Sunday
        fi
        echo "window=$WINDOW" >> "$GITHUB_OUTPUT"
        echo "Using window: $WINDOW"

  callout:
    needs: determine-window
    uses: ./.github/workflows/_cron-curl.yml
    with:
      label: Headcount callout (window=${{ needs.determine-window.outputs.window }})
      url: https://wolf-goat-pig.onrender.com/callouts/run?window=${{ needs.determine-window.outputs.window }}
      headers: 'Content-Type: application/json'
      max-time: 60
