documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '**/*.md'

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - 'frontend/**'

backend:
  - changed-files:
      - any-glob-to-any-file:
          - 'backend/**'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'requirements*.txt'
          - '**/requirements*.txt'
          - '**/package.json'
          - '**/package-lock.json'
          - '**/pnpm-lock.yaml'

tests:
  - changed-files:
      - any-glob-to-any-file:
          - '**/tests/**'
          - '**/*test*'
