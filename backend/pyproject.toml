[tool.ruff]
target-version = "py311"
line-length = 120
include = ["app/**/*.py", "tests/**/*.py", "features/**/*.py"]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort (replaces isort)
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "SIM",   # flake8-simplify
    "TCH",   # flake8-type-checking
    "S",     # flake8-bandit (security checks)
    "T20",   # flake8-print (catch print statements)
    "RET",   # flake8-return
    "PTH",   # flake8-use-pathlib
    "PERF",  # perflint (performance anti-patterns)
    "RUF",   # ruff-specific rules
    "ASYNC", # flake8-async
    "FA",    # flake8-future-annotations
]

ignore = [
    "E501",    # line too long (handled by formatter)
    "B008",    # function calls in argument defaults (FastAPI Depends)
    "N805",    # first argument should be named 'self' (Pydantic validators)
    "S101",    # assert usage (fine in tests, per-file-ignore below handles prod)
    "RET504",  # unnecessary assignment before return
    # Pre-existing violations — not enforced in this codebase yet
    "B904",    # raise without from inside except (widespread legacy pattern)
    "S311",    # non-cryptographic random (fine for golf wagering app)
    "T201",    # print statements (used for logging throughout)
    "E712",    # comparison to True/False
    "PERF401", # manual list comprehension
    "RUF001",  # ambiguous unicode character
    "SIM102",  # collapsible if
    "SIM108",  # if-else instead of ternary
    "SIM110",  # reimplemented builtin
    "SIM118",  # in dict.keys()
    "B007",    # unused loop control variable
    "RUF005",  # collection literal concatenation
    "C416",    # unnecessary comprehension
    "PTH123",  # use pathlib open
    "RUF012",  # mutable class default
    "S310",    # suspicious url open
    "TC002",   # typing-only third-party import
    "UP008",   # super() without args
    "PERF102", # incorrect dict iterator
    "S110",    # try-except-pass
    # False positives / low-value for this codebase
    "S105",    # "hardcoded password" - flags filename strings like TOKEN_FILE
    "S608",    # SQL injection - admin endpoint with controlled table name
    "S607",    # partial executable path - gcloud CLI usage
    "S301",    # pickle - standard pattern for OAuth token storage
    "RUF022",  # unsorted __all__ - opinionated, grouped by category intentionally
    "RUF002",  # math symbol in docstring (× for multiplication)
    "TC003",   # typing-only stdlib import - premature optimization
    "ASYNC230", # blocking open in async - would require larger refactor
    "SIM105",  # contextlib.suppress preference
    "C401",    # set() generator vs set comprehension - readability preference
    "RUF015",  # next(iter()) vs [0] - readability preference
    "B905",    # zip without strict= - pre-existing throughout
    "RUF013",  # implicit Optional - pre-existing in function signatures
    "N806",    # uppercase variable in function - used for constants intentionally
    "F841",    # unused variable - minor, pre-existing
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["E402", "F401", "F811", "S101", "S105", "S106"]
"features/**/*.py" = ["E402", "F401", "F811", "S101"]
"app/main.py" = ["E402"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
