[tool.ruff]
target-version = "py311"
line-length = 120
include = ["app/**/*.py", "tests/**/*.py"]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort (replaces isort)
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "SIM",   # flake8-simplify
    "TCH",   # flake8-type-checking
    "S",     # flake8-bandit (security checks)
    "T20",   # flake8-print (catch print statements)
    "RET",   # flake8-return
    "PTH",   # flake8-use-pathlib
    "PERF",  # perflint (performance anti-patterns)
    "RUF",   # ruff-specific rules
    "ASYNC", # flake8-async
    "FA",    # flake8-future-annotations
]

ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function calls in argument defaults (FastAPI Depends)
    "N805",   # first argument should be named 'self' (Pydantic validators)
    "S101",   # assert usage (fine in tests, per-file-ignore below handles prod)
    "RET504", # unnecessary assignment before return
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["E402", "F401", "F811", "S101", "S105", "S106"]
"app/main.py" = ["E402"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
